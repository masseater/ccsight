# `cargo audit` configuration.
#
# Mirror this list in `.github/workflows/verify.yml`'s `rustsec/audit-check`
# step so local `cargo audit` and CI report the same set. Revisit on every
# upgrade of the parent crate — keep this list as short as possible.

[advisories]
ignore = [
    # bincode 1.3.3 unmaintained — pulled by syntect 5.3's `dump-load`
    # feature (binary syntax/theme dumps). syntect upstream has not yet
    # migrated to bincode 2.x; the feature is mandatory for
    # `SyntaxSet::load_defaults_newlines`, so this stays until syntect
    # 5.4+ ships or we replace syntect.
    "RUSTSEC-2025-0141",
]
